# PIPELINE DEFINITION
# Name: synesis-manager-modelcar
# Description: Manager: download model to PVC. Load from PV at runtime (no OCI).
# Inputs:
#    model_name: str [Default: 'manager']
#    model_repo: str [Default: 'Qwen/Qwen2.5-32B-Instruct-AWQ']
#    pvc_name: str [Default: 'modelcar-build-pvc']
components:
  comp-download-model:
    executorLabel: exec-download-model
    inputDefinitions:
      parameters:
        model_repo:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-download-model:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - download_model
        command:
        - sh
        - -c
        - "\nuv venv /tmp/venv && . /tmp/venv/bin/activate && uv pip install -q \"kfp==2.16.0\" \"kubernetes>=8.0.0,<31\" && exec \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef download_model(model_repo: str):\n    \"\"\"Download HuggingFace\
          \ model to PVC. Streams to disk, ~6Gi memory.\"\"\"\n    import subprocess\n\
          \n    subprocess.run(\n        [\"uv\", \"pip\", \"install\", \"-q\", \"\
          huggingface_hub[hf_transfer]\"],\n        check=True,\n    )\n\n    import\
          \ os\n\n    out = \"/data/models\"\n    if os.path.isfile(os.path.join(out,\
          \ \"config.json\")):\n        print(\"Model already on PVC, skipping download\"\
          )\n        return\n    os.makedirs(out, exist_ok=True)\n    from huggingface_hub\
          \ import snapshot_download\n\n    print(\"Downloading\", model_repo, \"\
          ->\", out)\n    snapshot_download(\n        repo_id=model_repo,\n      \
          \  local_dir=out,\n        token=os.environ.get(\"HF_TOKEN\") or None,\n\
          \    )\n    print(\"Done\")\n\n"
        image: 660250927410.dkr.ecr.us-east-1.amazonaws.com/byron-ai-registry:model-pvc-download
        resources:
          cpuRequest: 1.0
          memoryLimit: 6.442450944
          memoryRequest: 4.294967296
          resourceCpuRequest: 1000m
          resourceMemoryLimit: 6Gi
          resourceMemoryRequest: 4Gi
pipelineInfo:
  description: 'Manager: download model to PVC. Load from PV at runtime (no OCI).'
  name: synesis-manager-modelcar
root:
  dag:
    tasks:
      download-model:
        cachingOptions: {}
        componentRef:
          name: comp-download-model
        inputs:
          parameters:
            model_repo:
              componentInputParameter: model_repo
        taskInfo:
          name: download-model
  inputDefinitions:
    parameters:
      model_name:
        defaultValue: manager
        isOptional: true
        parameterType: STRING
      model_repo:
        defaultValue: Qwen/Qwen2.5-32B-Instruct-AWQ
        isOptional: true
        parameterType: STRING
      pvc_name:
        defaultValue: modelcar-build-pvc
        isOptional: true
        parameterType: STRING
schemaVersion: 2.1.0
sdkVersion: kfp-2.16.0
---
platforms:
  kubernetes:
    deploymentSpec:
      executors:
        exec-download-model:
          pvcMount:
          - componentInputParameter: pvc_name
            mountPath: /data
            pvcNameParameter:
              componentInputParameter: pvc_name
          secretAsEnv:
          - keyToEnv:
            - envVar: HF_TOKEN
              secretKey: HF_TOKEN
            optional: true
            secretName: hf-hub-secret
            secretNameParameter:
              runtimeValue:
                constant: hf-hub-secret
