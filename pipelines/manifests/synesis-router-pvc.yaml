# PVC for router model (Qwen3-8B FP8, ~8 GB weights).
# 25Gi = model + download cache headroom (~2.5x buffer).
# Source of truth: models.yaml roles.router.pvc_*
#
# Create:
#   oc apply -f pipelines/manifests/storage-class-gp3-high.yaml   # once, as cluster-admin
#   sed "s/NAMESPACE/synesis-models/" pipelines/manifests/synesis-router-pvc.yaml | oc apply -f -
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: synesis-router-pvc
  namespace: NAMESPACE
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp3-high
  resources:
    requests:
      storage: 25Gi
