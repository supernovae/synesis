# High-performance gp3 StorageClass for ROSA/OpenShift on AWS.
# Apply as cluster-admin before creating PVCs that use it:
#   oc apply -f pipelines/manifests/storage-class-gp3-high.yaml
#
# If provisioner fails: run `oc get storageclass` and check gp2-csi provisioner.
# ROSA uses ebs.csi.aws.com; older OCP may use kubernetes.io/aws-ebs (no gp3).
# gp3 provides:
#   - Baseline 3000 IOPS, 125 MiB/s (included)
#   - Up to 16000 IOPS, 1000 MiB/s (provisioned below)
# For max performance: iops=16000, throughput=1000. Cost scales with provisioned IOPS/throughput.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3-high
  annotations:
    kubernetes.io/description: "High-performance gp3 EBS (16K IOPS, 1 GiB/s) for model pipelines"
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  iops: "16000"
  throughput: "1000"
  csi.storage.k8s.io/fstype: ext4
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
reclaimPolicy: Delete
