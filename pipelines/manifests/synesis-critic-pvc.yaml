# PVC for critic model (R1-Distill-32B FP8, ~33 GB weights).
# 100Gi = model + download cache headroom (~2.5x buffer).
# Source of truth: models.yaml roles.critic.pvc_*
#
# Create:
#   oc apply -f pipelines/manifests/storage-class-gp3-high.yaml   # once, as cluster-admin
#   sed "s/NAMESPACE/synesis-models/" pipelines/manifests/synesis-critic-pvc.yaml | oc apply -f -
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: synesis-critic-pvc
  namespace: NAMESPACE
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp3-high
  resources:
    requests:
      storage: 100Gi
