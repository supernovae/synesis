# PVC for executor model — download pipeline writes to /data/executor-model; deployment mounts same PVC.
# 32B FP8 ~33GiB. 50Gi = model + download cache headroom.
# Create in same namespace as pipeline runs AND deployment:
#   oc apply -f pipelines/manifests/storage-class-gp3-high.yaml   # once, as cluster-admin
#   sed "s/NAMESPACE/synesis-models/" pipelines/manifests/executor-build-pvc.yaml | oc apply -f -
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: executor-build-pvc
  namespace: NAMESPACE
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp3-high  # 16K IOPS, 1 GiB/s — apply storage-class-gp3-high.yaml first
  resources:
    requests:
      storage: 50Gi  # 32B FP8 ~33GB + buffer
