# Synesis Prompt Test Suite — comprehensive coverage of nodes, routing, and behavior.
#
# Usage:
#   python tests/prompts/run_test_suite.py --api-url https://synesis-planner.apps.openshiftdemo.dev
#   python tests/prompts/run_test_suite.py --category knowledge trivial node_routing
#   python tests/prompts/run_test_suite.py --ids know-01 route-03 regr-02
#
# Fields:
#   id:                     Unique prompt identifier
#   prompt:                 The user message to send
#   category:               Test category (matches CATEGORY_DEFAULTS in run_test_suite.py)
#   sequence:               Conversation sequence (null = new chat; otherwise group_id:turn)
#   expected_route:         worker | planner | respond
#   expected_deliverable:   explain_only | code_snippet | code_project | document
#   expected_lang:          Target language the system should infer
#   should_stream:          Whether tokens should stream in real-time
#   context_must_persist:   If true, prior turns in same sequence must be preserved
#   max_latency_s:          Acceptable total response time (seconds)
#   max_reasoning_s:        (optional) Override max reasoning duration for this prompt
#   max_reasoning_ratio:    (optional) Override max thinking-to-content ratio for this prompt
#   expected_phases:        (optional) Override auto-derived expected pipeline phases
#   notes:                  What to look for in logs

