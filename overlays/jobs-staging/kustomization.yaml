apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Staging indexer CronJobs: unsuspended, bi-weekly schedule.
# Usage: ./scripts/deploy-jobs.sh staging

resources:
  - ../../base/rag/indexers

patches:
  - target:
      kind: CronJob
      name: synesis-index-code
    patch: |
      - op: replace
        path: /spec/schedule
        value: "0 3 1,15 * *"

  - target:
      kind: CronJob
      name: synesis-index-apispec
    patch: |
      - op: replace
        path: /spec/schedule
        value: "0 4 1,15 * *"

  - target:
      kind: CronJob
      name: synesis-index-architecture
    patch: |
      - op: replace
        path: /spec/schedule
        value: "0 5 1,15 * *"

  - target:
      kind: CronJob
      name: synesis-index-license
    patch: |
      - op: replace
        path: /spec/schedule
        value: "0 6 1,15 * *"

images:
  - name: synesis-indexer-code
    newName: ghcr.io/supernovae/synesis/indexer-code
    newTag: latest
  - name: synesis-indexer-apispec
    newName: ghcr.io/supernovae/synesis/indexer-apispec
    newTag: latest
  - name: synesis-indexer-architecture
    newName: ghcr.io/supernovae/synesis/indexer-architecture
    newTag: latest
  - name: synesis-indexer-license
    newName: ghcr.io/supernovae/synesis/indexer-license
    newTag: latest
  - name: synesis-indexer-domain
    newName: ghcr.io/supernovae/synesis/indexer-domain
    newTag: latest

labels:
  - pairs:
      synesis.io/environment: staging
    includeSelectors: false
