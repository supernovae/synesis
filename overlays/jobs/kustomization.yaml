apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# RAG indexer CronJobs and Jobs only. Deploy separately from main stack
# so test deploys don't trigger indexer reloads.
#
# Usage: ./scripts/deploy-jobs.sh [dev|staging|prod]
# Prereq: deploy.sh has been run (Milvus, embedder, etc. must exist)
#
# CronJobs are suspended in dev; run indexers manually via scripts/index-*.sh

resources:
  - ../../base/rag/indexers

patches:
  # Suspend CronJobs in dev (run manually via index-*.sh)
  - target:
      kind: CronJob
      name: synesis-index-code
    patch: |
      - op: replace
        path: /spec/suspend
        value: true

  - target:
      kind: CronJob
      name: synesis-index-apispec
    patch: |
      - op: replace
        path: /spec/suspend
        value: true

  - target:
      kind: CronJob
      name: synesis-index-architecture
    patch: |
      - op: replace
        path: /spec/suspend
        value: true

  - target:
      kind: CronJob
      name: synesis-index-license
    patch: |
      - op: replace
        path: /spec/suspend
        value: true

  - target:
      kind: CronJob
      name: synesis-index-domain
    patch: |
      - op: replace
        path: /spec/suspend
        value: true

images:
  - name: synesis-indexer-code
    newName: ghcr.io/supernovae/synesis/indexer-code
    newTag: latest
  - name: synesis-indexer-apispec
    newName: ghcr.io/supernovae/synesis/indexer-apispec
    newTag: latest
  - name: synesis-indexer-architecture
    newName: ghcr.io/supernovae/synesis/indexer-architecture
    newTag: latest
  - name: synesis-indexer-license
    newName: ghcr.io/supernovae/synesis/indexer-license
    newTag: latest
  - name: synesis-indexer-domain
    newName: ghcr.io/supernovae/synesis/indexer-domain
    newTag: latest
