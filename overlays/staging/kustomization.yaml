apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Staging overlay: mirrors prod topology but with synthetic load
# testing support and slightly relaxed timeouts

resources:
  - ../../base/model-serving
  - ../../base/gateway
  - ../../base/planner
  - ../../base/rag
  - ../../base/supervisor
  - ../../base/observability
  - ../../base/sandbox
  - ../../base/admin
  - ../../base/lsp
  - ../../base/search
  - ../../base/webui

patches:
  # Staging uses same model config as prod but with info-level logging.
  # Medium/large profile: dedicated R1 critic (synesis-critic Service targets critic pod by default).
  # Uses strategic merge patch (targets env by name, immune to index drift).
  - target:
      kind: Deployment
      name: synesis-planner
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: synesis-planner
      spec:
        template:
          spec:
            containers:
              - name: planner
                env:
                  - name: SYNESIS_LOG_LEVEL
                    value: "info"

  # Set Route domain for staging
  - target:
      kind: Route
      name: synesis-api
    patch: |
      - op: replace
        path: /spec/host
        value: synesis-api-staging.apps.openshiftdemo.dev

  # Set Route domain for staging WebUI
  - target:
      kind: Route
      name: synesis-webui
    patch: |
      - op: replace
        path: /spec/host
        value: synesis-staging.apps.openshiftdemo.dev

images:
  - name: synesis-planner
    newName: ghcr.io/supernovae/synesis/planner
    newTag: latest
  - name: synesis-admin
    newName: ghcr.io/supernovae/synesis/admin
    newTag: latest
  - name: synesis-lsp-gateway
    newName: ghcr.io/supernovae/synesis/lsp-gateway
    newTag: latest
  - name: synesis-sandbox
    newName: ghcr.io/supernovae/synesis/sandbox
    newTag: latest
  - name: synesis-bge-reranker
    newName: ghcr.io/supernovae/synesis/bge-reranker
    newTag: latest
  - name: synesis-ingestor
    newName: ghcr.io/supernovae/synesis/ingestor
    newTag: latest

labels:
  - pairs:
      synesis.io/environment: staging
    includeSelectors: false
