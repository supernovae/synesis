apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Dev overlay: single replica, relaxed resources, debug logging,
# CPU-only supervisor model, reduced model context lengths

resources:
  - ../../base/model-serving
  - ../../base/gateway
  - ../../base/planner
  - ../../base/rag
  - ../../base/supervisor
  - ../../base/observability
  - ../../base/sandbox
  - ../../base/admin
  - ../../base/lsp
  - ../../base/search
  - ../../base/webui

patches:
  # Debug logging, disable FlashRank, reduce resources for dev.
  # Uses strategic merge patch (targets env by name, immune to index drift).
  - target:
      kind: Deployment
      name: synesis-planner
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: synesis-planner
      spec:
        template:
          spec:
            containers:
              - name: planner
                env:
                  - name: SYNESIS_LOG_LEVEL
                    value: "debug"
                  - name: SYNESIS_RAG_RERANKER
                    value: "none"
                resources:
                  requests:
                    cpu: "250m"
                    memory: "512Mi"

  # Reduce LiteLLM resources
  - target:
      kind: Deployment
      name: litellm-proxy
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "100m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"

  # Reduce LSP gateway resources for dev
  - target:
      kind: Deployment
      name: lsp-gateway
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "2Gi"

  # Reduce SearXNG resources for dev
  - target:
      kind: Deployment
      name: searxng
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "100m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "128Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "256Mi"

  # Small profile: no dedicated R1 critic — Qwen3-8B handles critic via thinking mode.
  # Scale executor deployment to 0 (frees 1 GPU for the coder).
  - target:
      kind: Deployment
      name: synesis-executor
    patch: |
      - op: replace
        path: /spec/replicas
        value: 0

  # Small profile: 3-GPU layout with dedicated general model.
  # Router+Critic on GPU 0 (Qwen3-8B), General on GPU 1 (Qwen3.5-35B),
  # Coder on GPU 2. R1 executor scaled to 0.
  # Worker uses the dedicated general model for response generation.
  - target:
      kind: Deployment
      name: synesis-planner
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: synesis-planner
      spec:
        template:
          spec:
            containers:
              - name: planner
                env:
                  - name: SYNESIS_CRITIC_MODEL_URL
                    value: "http://synesis-critic.synesis-models.svc.cluster.local:8080/v1"
                  - name: SYNESIS_CRITIC_MODEL_NAME
                    value: "synesis-critic"
                  - name: SYNESIS_EXECUTOR_MODEL_URL
                    value: "http://synesis-general.synesis-models.svc.cluster.local:8080/v1"
                  - name: SYNESIS_EXECUTOR_MODEL_NAME
                    value: "synesis-general"

  # Scale warm pool to 1 replica in dev
  - target:
      kind: Deployment
      name: synesis-warm-pool
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1

  # Disable CronJobs in dev (manual trigger only)
  - target:
      kind: CronJob
      name: synesis-index-code
    patch: |
      - op: replace
        path: /spec/suspend
        value: true

  - target:
      kind: CronJob
      name: synesis-index-apispec
    patch: |
      - op: replace
        path: /spec/suspend
        value: true

  - target:
      kind: CronJob
      name: synesis-index-architecture
    patch: |
      - op: replace
        path: /spec/suspend
        value: true

  - target:
      kind: CronJob
      name: synesis-index-license
    patch: |
      - op: replace
        path: /spec/suspend
        value: true

  - target:
      kind: CronJob
      name: synesis-index-domain
    patch: |
      - op: replace
        path: /spec/suspend
        value: true

  # Reduce Open WebUI resources for dev
  - target:
      kind: Deployment
      name: open-webui
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "100m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"

  # Bypass LiteLLM: Open WebUI talks directly to planner (fixes connection errors)
  - target:
      kind: Deployment
      name: open-webui
    path: openwebui-direct-planner.yaml

  # Reduce Milvus standalone to minimal footprint in dev
  - target:
      kind: Deployment
      name: milvus-standalone
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "250m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "1Gi"

images:
  - name: synesis-planner
    newName: ghcr.io/supernovae/synesis/planner
    newTag: latest
  - name: synesis-admin
    newName: ghcr.io/supernovae/synesis/admin
    newTag: latest
  - name: synesis-lsp-gateway
    newName: ghcr.io/supernovae/synesis/lsp-gateway
    newTag: latest
  - name: synesis-sandbox
    newName: ghcr.io/supernovae/synesis/sandbox
    newTag: latest
  - name: synesis-bge-reranker
    newName: ghcr.io/supernovae/synesis/bge-reranker
    newTag: latest
  - name: synesis-ingestor
    newName: ghcr.io/supernovae/synesis/ingestor
    newTag: latest
  - name: synesis-indexer-code
    newName: ghcr.io/supernovae/synesis/indexer-code
    newTag: latest
  - name: synesis-indexer-apispec
    newName: ghcr.io/supernovae/synesis/indexer-apispec
    newTag: latest
  - name: synesis-indexer-architecture
    newName: ghcr.io/supernovae/synesis/indexer-architecture
    newTag: latest
  - name: synesis-indexer-license
    newName: ghcr.io/supernovae/synesis/indexer-license
    newTag: latest
  - name: synesis-indexer-domain
    newName: ghcr.io/supernovae/synesis/indexer-domain
    newTag: latest

labels:
  - pairs:
      synesis.io/environment: dev
    includeSelectors: false
