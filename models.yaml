# ============================================================================
# Synesis Model Registry -- Reference for Deployed Models
# ============================================================================
#
# Deployment architecture (g6e.4xlarge, 2x L40S GPUs):
#
#   GPU 1 (L40S): synesis-supervisor-critic  — Deployment (PVC-based)
#                 Serves supervisor, planner, and critic roles from one 8B
#                 AWQ model. Two K8s Services route to the same pod:
#                   - synesis-supervisor-predictor (supervisor + planner)
#                   - synesis-critic-predictor     (critic)
#
#   GPU 2 (L40S): synesis-executor  — Deployment (PVC-based)
#                 DeepSeek R1-Distill-Qwen-30B for code generation with
#                 chain-of-thought reasoning.
#
#   CPU:          synesis-summarizer  — KServe InferenceService
#                 Qwen2.5-0.5B for pivot history summarization.
#                 Only model still using KServe (no GPU sharing issues).
#
# See base/model-serving/README.md, docs/MODEL_ARCHITECTURE_PROPOSAL.md.
# ============================================================================

models:
  # -------------------------------------------------------------------------
  # GPU 1: Supervisor / Planner / Critic (shared 8B model, Deployment)
  # -------------------------------------------------------------------------
  supervisor_critic:
    name: "synesis-supervisor"
    served_model_name: "synesis-supervisor"
    display_name: "Qwen3 8B AWQ (Supervisor / Planner / Critic)"
    role: "Routing, task planning, and Safety-II critic review"
    huggingface_repo: "RedHatAI/Qwen3-8B-FP8-dynamic"
    quantization: "awq"
    architecture: "dense"
    deployment_type: "Deployment (PVC: modelcar-build-pvc, subPath: models)"
    requires_gpu: true
    min_vram_gb: 8
    context_length: 32768
    vllm_args:
      - "--quantization=awq"
      - "--enable-prefix-caching"
      - "--gpu-memory-utilization=0.90"
      - "--max-model-len=32768"
    notes: >
      Single Deployment pod serves three logical roles via two K8s Services.
      Planner calls route to synesis-supervisor-predictor; critic calls
      route to synesis-critic-predictor. Both hit the same pod. Future:
      LoRA adapters per role for specialized tuning.

  # -------------------------------------------------------------------------
  # GPU 2: Executor (DeepSeek R1-Distill, Deployment)
  # -------------------------------------------------------------------------
  executor:
    name: "synesis-executor"
    served_model_name: "synesis-executor"
    display_name: "DeepSeek R1-Distill-Qwen-32B GPTQ-INT4 (Executor)"
    role: "Code generation with chain-of-thought reasoning"
    huggingface_repo: "dwetzel/DeepSeek-R1-Distill-Qwen-32B-GPTQ-INT4"
    quantization: "gptq"
    architecture: "dense (32B, INT4 ≈ 16 GB weights)"
    deployment_type: "Deployment (PVC: executor-build-pvc, subPath: executor-model)"
    requires_gpu: true
    min_vram_gb: 20
    context_length: 20480
    vllm_args:
      - "--quantization=gptq"
      - "--reasoning-parser=deepseek_r1"
      - "--enable-prefix-caching"
      - "--enable-chunked-prefill"
      - "--gpu-memory-utilization=0.90"
      - "--max-model-len=20480"
    notes: >
      GPTQ INT4 quantized R1-Distill. Always produces <think>...</think>
      reasoning before content (architectural, not parameter-controlled).
      vLLM auto-detects GPTQ from config.json but explicit flag is safer.
      The planner SSE pipeline extracts reasoning headlines for live
      "Thinking: ..." status updates in Open WebUI.

  # -------------------------------------------------------------------------
  # CPU: Summarizer (KServe InferenceService)
  # -------------------------------------------------------------------------
  summarizer:
    name: "synesis-summarizer"
    served_model_name: "synesis-summarizer"
    display_name: "Qwen2.5 0.5B Instruct (Summarizer)"
    role: "Pivot history summarization, conversation context compression"
    huggingface_repo: "Qwen/Qwen2.5-0.5B-Instruct"
    quantization: "none"
    architecture: "dense"
    deployment_type: "KServe InferenceService (hf:// direct download)"
    requires_gpu: false
    min_vram_gb: 0
    context_length: 8192
    vllm_args:
      - "--max-model-len=8192"
    notes: >
      Only model still using KServe (CPU-only, no GPU sharing issues).
      KServe minReplicas=0 allows scale-to-zero when idle.

  # -------------------------------------------------------------------------
  # Supporting services (non-LLM)
  # -------------------------------------------------------------------------
  embedder:
    name: "all-MiniLM-L6-v2"
    display_name: "MiniLM L6 v2 Embedder"
    role: "RAG embedding generation"
    huggingface_repo: "sentence-transformers/all-MiniLM-L6-v2"
    tokenizer_repo: "sentence-transformers/all-MiniLM-L6-v2"
    quantization: "none"
    requires_gpu: false
    embedding_dim: 384

# ============================================================================
# Logical role -> physical model mapping
# ============================================================================
#   supervisor_model  -> synesis-supervisor-predictor  (Qwen3-8B AWQ, GPU 1)
#   planner_model     -> synesis-supervisor-predictor  (same model/endpoint)
#   executor_model    -> synesis-executor-predictor    (R1-Distill-30B, GPU 2)
#   critic_model      -> synesis-critic-predictor      (same pod as supervisor)
#   summarizer_model  -> synesis-summarizer-predictor  (Qwen2.5-0.5B, CPU)

# Service URL pattern:
#   http://<service-name>.<namespace>.svc.cluster.local:8080/v1

# Files that reference model identifiers or endpoints:
references:
  - base/gateway/litellm-config.yaml
  - base/planner/app/config.py
  - base/planner/deployment.yaml
  - base/rag/embedder/deployment.yaml
  - base/supervisor/configmap.yaml
  - base/model-serving/kustomization.yaml
  - base/model-serving/deployment-vllm-supervisor-critic.yaml
  - base/model-serving/deployment-vllm-executor.yaml
  - base/model-serving/inference-service-summarizer.yaml
  - base/model-serving/serving-runtime-vllm-cpu.yaml
