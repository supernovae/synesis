name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck on all shell scripts
        run: |
          find scripts/ -name '*.sh' -type f | xargs shellcheck --severity=warning --shell=bash
          find base/ -name '*.sh' -type f | xargs shellcheck --severity=warning --shell=bash || true

  python:
    name: Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check base/ --output-format=github

      - name: Ruff format check
        run: ruff format --check base/

  yaml:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: yamllint -c .yamllint.yml base/ overlays/ models.yaml

  kustomize:
    name: Kustomize Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        overlay: [dev, staging, prod]
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize
        run: |
          curl -sL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Validate kustomize build (${{ matrix.overlay }})
        run: kustomize build overlays/${{ matrix.overlay }} > /dev/null

  planner-tests:
    name: Planner Unit Tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
        include:
          - python-version: "3.11"
            required: true
          - python-version: "3.13"
            required: false
    continue-on-error: ${{ !matrix.required }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: base/planner
        run: pip install -r requirements-test.txt

      - name: Run tests
        working-directory: base/planner
        run: python -m pytest tests/ -v --tb=short --junitxml=../../test-results-${{ matrix.python-version }}.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: planner-test-results-${{ matrix.python-version }}
          path: test-results-${{ matrix.python-version }}.xml

  hadolint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install hadolint
        run: |
          curl -sL -o hadolint "https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64"
          chmod +x hadolint
          sudo mv hadolint /usr/local/bin/

      - name: Lint Dockerfiles
        run: |
          status=0
          for df in $(find base/ -name 'Dockerfile' -type f | sort); do
            echo "--- $df ---"
            hadolint \
              --ignore DL3008 --ignore DL3013 --ignore DL3018 \
              --ignore DL3016 \
              --failure-threshold error \
              "$df" || status=1
          done
          exit "$status"
