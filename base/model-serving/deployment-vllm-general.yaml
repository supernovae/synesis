# Synesis General — general reasoning + writer model (Qwen3.5-35B-A3B FP8)
#
# Serves worker (executor) and writer roles. This is the main response
# generation model for Open WebUI users and the planner worker node.
#
# Profile-dependent:
#   small:  Qwen3.5-35B-A3B-FP8 (~35 GB), single L40S, TP=1, 32K ctx
#   medium: Qwen3.5-35B-A3B BF16 (~70 GB), single L40S not enough → needs FP8 or TP=2
#   large:  Qwen3-235B-A22B FP8, TP=2
#
# Prerequisites: synesis-general-pvc in synesis-models, model via run-model-pipeline.sh --role=general
---
apiVersion: v1
kind: Service
metadata:
  name: synesis-general
  namespace: synesis-models
  labels:
    app.kubernetes.io/name: synesis-general
    app.kubernetes.io/part-of: synesis
    app.kubernetes.io/component: model-serving
spec:
  selector:
    app: synesis-general
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: synesis-general
  namespace: synesis-models
  labels:
    app.kubernetes.io/name: synesis-general
spec:
  replicas: 1
  selector:
    matchLabels:
      app: synesis-general
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: synesis-general
    spec:
      imagePullPolicy: IfNotPresent
      volumes:
        - name: model-store
          persistentVolumeClaim:
            claimName: synesis-general-pvc
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
      containers:
        - name: vllm-general
          image: registry.redhat.io/rhaiis/vllm-cuda-rhel9@sha256:094db84a1da5e8a575d0c9eade114fa30f4a2061064a338e3e032f3578f8082a
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - vllm.entrypoints.openai.api_server
          args:
            - --port=8080
            - --model=/mnt/models
            - --served-model-name=synesis-general
            - --tensor-parallel-size=1
            - --max-model-len=32768
            - --gpu-memory-utilization=0.92
            - --generation-config=vllm
            - --enable-prefix-caching
            - --enable-chunked-prefill
          resources:
            limits:
              cpu: "8"
              memory: 48Gi
              nvidia.com/gpu: "1"
            requests:
              cpu: "4"
              memory: 32Gi
              nvidia.com/gpu: "1"
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: model-store
              mountPath: /mnt/models
              subPath: general-model
              readOnly: true
            - name: shm
              mountPath: /dev/shm
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-L40S
      tolerations:
        - effect: NoSchedule
          key: nvidia.com/gpu
          operator: Equal
          value: "true"
