# Synesis Supervisor + Critic — one model serves both roles
#
# Same model instance, different inference params per request (e.g. temperature for
# supervisor vs critic). Planner/client sets temp and prompt per role.
# Loads from PVC (pipeline downloads to modelcar-build-pvc).
#
# Topology: 2× L40S — this uses 1 GPU; Executor uses the other.
# Flexible to 2-4 GPUs: nodeSelector can target L40S; scaling documented.
#
# Prerequisites: modelcar-build-pvc in synesis-models, model via manager pipeline.
---
apiVersion: v1
kind: Service
metadata:
  name: synesis-supervisor-predictor
  namespace: synesis-models
  labels:
    app.kubernetes.io/name: synesis-supervisor-critic
spec:
  selector:
    app: synesis-supervisor-critic
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: synesis-critic-predictor
  namespace: synesis-models
  labels:
    app.kubernetes.io/name: synesis-supervisor-critic
spec:
  selector:
    app: synesis-supervisor-critic
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: synesis-supervisor-critic-predictor
  namespace: synesis-models
  labels:
    app.kubernetes.io/name: synesis-supervisor-critic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: synesis-supervisor-critic
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: synesis-supervisor-critic
    spec:
      imagePullPolicy: IfNotPresent
      volumes:
        - name: model-store
          persistentVolumeClaim:
            claimName: modelcar-build-pvc
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
      containers:
        - name: vllm-supervisor-critic
          image: registry.redhat.io/rhaiis/vllm-cuda-rhel9@sha256:094db84a1da5e8a575d0c9eade114fa30f4a2061064a338e3e032f3578f8082a
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - vllm.entrypoints.openai.api_server
          args:
            - --port=8080
            - --model=/mnt/models
            - --quantization=awq
            - --served-model-name=synesis-supervisor
            - --tensor-parallel-size=1
            - --max-model-len=32768
            - --gpu-memory-utilization=0.72
            - --enable-prefix-caching
          resources:
            limits:
              cpu: "4"
              memory: 16Gi
              nvidia.com/gpu: "1"
            requests:
              cpu: "2"
              memory: 8Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: model-store
              mountPath: /mnt/models
              subPath: models
              readOnly: true
            - name: shm
              mountPath: /dev/shm
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-L40S
      tolerations:
        - effect: NoSchedule
          key: nvidia.com/gpu
          operator: Equal
          value: "true"
