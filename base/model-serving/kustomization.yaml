apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: synesis-models

labels:
  - pairs:
      app.kubernetes.io/part-of: synesis
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: false

resources:
  - namespace.yaml
  # Summarizer (0.5B on CPU) — no GPU; KServe hf:// direct download
  - connection-summarizer.yaml
  - serving-runtime-vllm-cpu.yaml
  - inference-service-summarizer.yaml
  # Router: Qwen3-8B — taxonomy routing, fast classification. 1 GPU.
  - deployment-vllm-router.yaml
  # General: Qwen3.5-35B-A3B — worker/writer response generation. 1 GPU.
  - deployment-vllm-general.yaml
  # Critic: R1-Distill-32B — deep reasoning critic. 1 GPU (scaled to 0 in small).
  - deployment-vllm-critic.yaml
  # Coder: Qwen3-Coder — direct IDE endpoint for agentic coding. 1 GPU.
  - deployment-vllm-coder.yaml
  # Route for direct Coder/IDE access
  - route-coder.yaml
