apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: synesis-models

labels:
  - pairs:
      app.kubernetes.io/part-of: synesis
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: false

resources:
  - namespace.yaml
  # ODH URI connection for summarizer (hf://)
  - connection-summarizer.yaml
  # Summarizer (0.5B on CPU) — no GPU; schedules on any node
  - serving-runtime-vllm-cpu.yaml
  - inference-service-summarizer.yaml
  # Supervisor+Critic: one model, two roles (different temps per request). 1 GPU.
  - deployment-vllm-supervisor-critic.yaml
  # Executor: code gen. 1 GPU. Both L40S, split across 2-4 GPUs as needed.
  - deployment-vllm-executor.yaml
  - route-executor.yaml
