# Synesis Critic — deep reasoning model (DeepSeek R1-Distill-Qwen-32B FP8)
#
# R1 is the dedicated critic for quality evaluation.
# Its extended thinking is an asset for evaluation tasks.
# Also available as an optional "thinking model" in Open WebUI.
#
# Loads from PVC (pipeline downloads to synesis-critic-pvc).
# FP8 weights ~32GB + FP8 KV cache on 48GB L40S at 0.92 utilization.
#
# In small profile, this deployment is scaled to 0 (Qwen3-8B handles critic
# via thinking mode on the router pod). The synesis-critic Service selector
# is patched to target the router pod in the dev overlay.
#
# Prerequisites: synesis-critic-pvc in synesis-models, model via run-model-pipeline.sh --role=critic
---
apiVersion: v1
kind: Service
metadata:
  name: synesis-critic
  namespace: synesis-models
  labels:
    app.kubernetes.io/name: synesis-critic
    app.kubernetes.io/part-of: synesis
    app.kubernetes.io/component: model-serving
spec:
  selector:
    app: synesis-critic
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: synesis-critic
  namespace: synesis-models
  labels:
    app.kubernetes.io/name: synesis-critic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: synesis-critic
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: synesis-critic
    spec:
      imagePullPolicy: IfNotPresent
      volumes:
        - name: model-store
          persistentVolumeClaim:
            claimName: synesis-models-efs
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 32Gi
      containers:
        - name: vllm-critic
          image: registry.redhat.io/rhaiis/vllm-cuda-rhel9@sha256:094db84a1da5e8a575d0c9eade114fa30f4a2061064a338e3e032f3578f8082a
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - vllm.entrypoints.openai.api_server
          args:
            - --port=8080
            - --tensor-parallel-size=1
            - --model=/mnt/models
            - --served-model-name=synesis-critic
            - --max-model-len=20480
            - --gpu-memory-utilization=0.92
            - --generation-config=vllm
            - --kv-cache-dtype=fp8_e4m3
            - --reasoning-parser=deepseek_r1
            - --enable-chunked-prefill
            - --trust-remote-code
          resources:
            limits:
              cpu: "8"
              memory: 48Gi
              nvidia.com/gpu: "1"
            requests:
              cpu: "4"
              memory: 32Gi
              nvidia.com/gpu: "1"
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: model-store
              mountPath: /mnt/models
              subPath: critic-model
              readOnly: true
            - name: shm
              mountPath: /dev/shm
      nodeSelector:
        node-role.autonode/gpu: ""
      tolerations:
        - effect: NoSchedule
          key: nvidia.com/gpu
          operator: Equal
          value: "true"
