# Synesis Executor — code generation model
#
# Loads from PVC (pipeline downloads to executor-build-pvc).
#
# Topology: 2× L40S — this uses 1 GPU; Supervisor+Critic uses the other.
# Flexible to 2-4 GPUs; nodeSelector targets L40S.
#
# Prerequisites: executor-build-pvc in synesis-models, model via executor pipeline.
---
apiVersion: v1
kind: Service
metadata:
  name: synesis-executor-predictor
  namespace: synesis-models
  labels:
    app.kubernetes.io/name: synesis-executor
    app.kubernetes.io/part-of: synesis
    app.kubernetes.io/component: model-serving
spec:
  selector:
    app: synesis-executor
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: synesis-executor-predictor
  namespace: synesis-models
  labels:
    app.kubernetes.io/name: synesis-executor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: synesis-executor
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: synesis-executor
    spec:
      imagePullPolicy: IfNotPresent
      volumes:
        - name: model-store
          persistentVolumeClaim:
            claimName: executor-build-pvc
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 32Gi
      containers:
        - name: vllm-executor
          image: registry.redhat.io/rhaiis/vllm-cuda-rhel9@sha256:094db84a1da5e8a575d0c9eade114fa30f4a2061064a338e3e032f3578f8082a
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - vllm.entrypoints.openai.api_server
          args:
            - --port=8080
            - --tensor-parallel-size=1
            - --model=/mnt/models
            - --served-model-name=synesis-executor
            - --quantization=gptq
            - --max-model-len=20480
            - --gpu-memory-utilization=0.90
            - --enable-prefix-caching
            - --enable-chunked-prefill
            - --trust-remote-code
            - --reasoning-parser=deepseek_r1
          resources:
            limits:
              cpu: "8"
              memory: 48Gi
              nvidia.com/gpu: "1"
            requests:
              cpu: "4"
              memory: 32Gi
              nvidia.com/gpu: "1"
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: model-store
              mountPath: /mnt/models
              subPath: executor-model
              readOnly: true
            - name: shm
              mountPath: /dev/shm
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-L40S
      tolerations:
        - effect: NoSchedule
          key: nvidia.com/gpu
          operator: Equal
          value: "true"
