# Synesis Executor — code generation model
#
# Loads from PVC (pipeline downloads to executor-build-pvc).
#
# Topology: 2× L40S — this uses 1 GPU; Supervisor+Critic uses the other.
# Flexible to 2-4 GPUs; nodeSelector targets L40S.
#
# Prerequisites: executor-build-pvc in synesis-models, model via executor pipeline.
---
apiVersion: v1
kind: Service
metadata:
  name: synesis-executor-predictor
  namespace: synesis-models
  labels:
    app.kubernetes.io/name: synesis-executor
spec:
  selector:
    app: synesis-executor
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: synesis-executor-predictor
  namespace: synesis-models
  labels:
    app.kubernetes.io/name: synesis-executor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: synesis-executor
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: synesis-executor
    spec:
      imagePullPolicy: IfNotPresent
      volumes:
        - name: model-store
          persistentVolumeClaim:
            claimName: executor-build-pvc
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 32Gi
        - name: vllm-sockets
          hostPath:
            path: /var/lib/synesis/vllm-sockets
            type: DirectoryOrCreate
      containers:
        - name: vllm-executor
          image: registry.redhat.io/rhaiis/vllm-cuda-rhel9@sha256:094db84a1da5e8a575d0c9eade114fa30f4a2061064a338e3e032f3578f8082a
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - vllm.entrypoints.openai.api_server
          args:
            - --port=8080
            - --tensor-parallel-size=1
            - --model=/mnt/models
            - --served-model-name=synesis-executor
            - --max-model-len=20480
            - --gpu-memory-utilization=0.72
            - --enable-prefix-caching
            - --enable-chunked-prefill
            - --trust-remote-code
            - --reasoning-parser=deepseek_r1
          resources:
            limits:
              cpu: "8"
              memory: 48Gi
              nvidia.com/gpu: "1"
            requests:
              cpu: "4"
              memory: 32Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: model-store
              mountPath: /mnt/models
              subPath: executor-model
              readOnly: true
            - name: shm
              mountPath: /dev/shm
            - name: vllm-sockets
              mountPath: /var/lib/synesis/vllm-sockets
        # UDS proxy: Planner connects via socket to avoid OVN; forwards to vLLM
        - name: uds-proxy
          image: alpine/socat:latest
          imagePullPolicy: IfNotPresent
          args:
            - sh
            - -c
            - |
              mkdir -p /var/lib/synesis/vllm-sockets
              chmod 777 /var/lib/synesis/vllm-sockets
              exec socat UNIX-LISTEN:/var/lib/synesis/vllm-sockets/executor.sock,fork,reuseaddr,mode=777 TCP:127.0.0.1:8080
          volumeMounts:
            - name: vllm-sockets
              mountPath: /var/lib/synesis/vllm-sockets
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-L40S
      tolerations:
        - effect: NoSchedule
          key: nvidia.com/gpu
          operator: Equal
          value: "true"
