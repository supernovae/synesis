# Synesis Router — Qwen3-8B FP8-dynamic with thinking mode
#
# Serves router, planner, advisor, and critic roles from a single model instance.
# Qwen3's per-request enable_thinking control allows dual behavior:
#   - Router/planner/advisor: enable_thinking=False → fast JSON classification
#   - Critic: enable_thinking=True → chain-of-thought reasoning before evaluation
#
# In small profile (3 GPUs), this eliminates the need for a separate R1 critic
# deployment, keeping all 3 GPUs for router+critic, general, and coder.
# Medium/large profiles deploy a dedicated R1 via synesis-critic deployment.
#
# --enable-reasoning + --reasoning-parser=qwen3 separates <think> tokens into
# reasoning_content field, keeping the content field clean for JSON parsing.
#
# Prerequisites: synesis-router-pvc in synesis-models, model via run-model-pipeline.sh --role=router
---
apiVersion: v1
kind: Service
metadata:
  name: synesis-router
  namespace: synesis-models
  labels:
    app.kubernetes.io/name: synesis-router
    app.kubernetes.io/part-of: synesis
    app.kubernetes.io/component: model-serving
spec:
  selector:
    app: synesis-router
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: synesis-router
  namespace: synesis-models
  labels:
    app.kubernetes.io/name: synesis-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: synesis-router
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: synesis-router
    spec:
      imagePullPolicy: IfNotPresent
      volumes:
        - name: model-store
          persistentVolumeClaim:
            claimName: synesis-router-pvc
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
      containers:
        - name: vllm-router
          image: registry.redhat.io/rhaiis/vllm-cuda-rhel9@sha256:094db84a1da5e8a575d0c9eade114fa30f4a2061064a338e3e032f3578f8082a
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - vllm.entrypoints.openai.api_server
          args:
            - --port=8080
            - --model=/mnt/models
            - --served-model-name=synesis-router,synesis-critic
            - --tensor-parallel-size=1
            - --max-model-len=32768
            - --gpu-memory-utilization=0.90
            - --generation-config=vllm
            - --enable-prefix-caching
            - --enable-reasoning
            - --reasoning-parser=qwen3
          resources:
            limits:
              cpu: "4"
              memory: 16Gi
              nvidia.com/gpu: "1"
            requests:
              cpu: "2"
              memory: 8Gi
              nvidia.com/gpu: "1"
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: model-store
              mountPath: /mnt/models
              subPath: router-model
              readOnly: true
            - name: shm
              mountPath: /dev/shm
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-L40S
      tolerations:
        - effect: NoSchedule
          key: nvidia.com/gpu
          operator: Equal
          value: "true"
