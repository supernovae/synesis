apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: synesis-gateway
  labels:
    app.kubernetes.io/part-of: synesis
    app.kubernetes.io/component: gateway
data:
  config.yaml: |
    # Synesis V3 Model Endpoints
    # See models.yaml for profile-specific model assignments and GPU sizing.
    #
    # synesis-agent: Open WebUI default — routes through Synesis planner pipeline
    # synesis-coder: IDE direct endpoint — bypasses planner, agentic coding
    # synesis-thinking: Optional R1 thinking model — user-selectable in Open WebUI
    model_list:
      # Primary pipeline endpoint (Open WebUI → LangGraph pipeline)
      - model_name: synesis-agent
        litellm_params:
          model: openai/synesis-agent
          api_base: http://synesis-planner.synesis-planner.svc.cluster.local:8000/v1
          api_key: "not-needed"
          max_tokens: 8192
          temperature: 0.2

      # Router (Qwen3-8B FP8) — supervisor, planner, advisor roles
      - model_name: synesis-router
        litellm_params:
          model: openai/synesis-supervisor
          api_base: http://synesis-supervisor-predictor.synesis-models.svc.cluster.local:8080/v1
          api_key: "not-needed"
          max_tokens: 4096
          temperature: 0.3

      # Critic — routes to synesis-critic-predictor Service.
      # Small profile: resolves to Qwen3-8B (supervisor-critic pod, thinking mode).
      # Medium/large: resolves to R1-Distill (executor pod) when executor is deployed.
      # The critic Service selector is profile-aware via Kustomize overlays.
      - model_name: synesis-critic
        litellm_params:
          model: openai/synesis-critic
          api_base: http://synesis-critic-predictor.synesis-models.svc.cluster.local:8080/v1
          api_key: "not-needed"
          max_tokens: 4096
          temperature: 0.1

      # Coder (Qwen3-Coder-Next-FP8) — direct IDE endpoint, agentic coding
      - model_name: synesis-coder
        litellm_params:
          model: openai/synesis-coder
          api_base: http://synesis-coder-predictor.synesis-models.svc.cluster.local:8080/v1
          api_key: "not-needed"
          max_tokens: 16384
          temperature: 0.2

      # Thinking model — Open WebUI optional "think out loud" model.
      # Small: uses Qwen3-8B thinking mode; medium/large: uses R1 via executor.
      - model_name: synesis-thinking
        litellm_params:
          model: openai/synesis-critic
          api_base: http://synesis-critic-predictor.synesis-models.svc.cluster.local:8080/v1
          api_key: "not-needed"
          max_tokens: 8192
          temperature: 0.2

      # Router alias (same as synesis-supervisor-predictor)
      - model_name: synesis-supervisor
        litellm_params:
          model: openai/synesis-supervisor
          api_base: http://synesis-supervisor-predictor.synesis-models.svc.cluster.local:8080/v1
          api_key: "not-needed"
          max_tokens: 4096
          temperature: 0.3

    litellm_settings:
      drop_params: true
      set_verbose: false
      num_retries: 2
      request_timeout: 120

    general_settings:
      master_key: "sk-synesis-change-me"
      forward_client_headers_to_llm_api: true
      background_health_checks: false
