# Synesis Global Sovereign Intent Catalog v4.1
# "The 95%" — Comprehensive router for 100+ industrial, creative, scientific, lifestyle verticals.
#
# DESIGN RULES:
# - Trivial (<5): Lightweight triggers only. Fast-path protected.
# - Small (5-15): Single-step, localized scope.
# - Complex (>15): Multi-step, protocol-heavy, stateful, or architecturally significant.
# - Risk (≥15): Veto to complex. Destructive, PII/PHI, financial, safety-critical.
# - Domain: RAG gravity ONLY. Never escalates complexity.
#
# USAGE: Replace intent_weights.yaml with this file, or merge via SYNESIS_ENTRY_CLASSIFIER_CONFIG.
# Plugins (plugins/weights/*.yaml) add vertical-specific depth; master covers the baseline.
# See docs/TAXONOMY.md for full coverage matrix.

thresholds:
  trivial_max: 4
  small_max: 15
  density_threshold: 3
  density_tax: 10
  educational_discount: 10
  risk_high: 15
  max_trivial_message_length: 200

# Fast-path protection: block trivial when these appear
risk_veto_triggers:
  - "pip install"
  - "pip3 install"
  - "npm install"
  - "yarn add"
  - "pnpm add"
  - "go get"
  - "cargo add"
  - "curl |"
  - "wget |"
  - "| bash"
  - "| sh"
  - "chmod +x"
  - "rm -rf"
  - "dd if="

