# Synesis Healthcare Compliance Plugin
# Focus: Protecting PHI, interoperability risks, healthcare systems.
risk_weights:
  phi_identifiers:
    weight: 15
    domain: healthcare_compliance
    keywords: ["phi", "patient", "medical record", "ssn", "dob", "provider", "diagnosis", "hipaa"]

complexity_weights:
  interop_standards:
    weight: 12
    keywords: ["hl7", "fhir", "emr", "ehr", "dicom", "loinc", "snomed"]

domain_keywords:
  healthcare_systems:
    domain: healthcare_compliance
    keywords: ["epic", "cerner", "meditech", "allscripts"]

pairings:
  - keywords: ["phi", "public"]
    extra_weight: 40
    axis: risk
  - keywords: ["fhir", "ingress"]
    extra_weight: 20
    axis: risk
  - keywords: ["hipaa", "log"]
    extra_weight: 15
    axis: risk
