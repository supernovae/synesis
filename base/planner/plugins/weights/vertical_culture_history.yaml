# Synesis Culture, History & Humanities Plugin
# Focus: History, geography, travel, music, art, philosophy, film/TV, literature, theater, religion, linguistics.
# Parenting, pets, and automotive moved to dedicated vertical files.

complexity_weights:
  historical_analysis:
    weight: 8
    keywords: ["primary source", "historiography", "periodization", "causation", "historical context"]
  music_theory:
    weight: 8
    keywords: ["chord progression", "key signature", "time signature", "counterpoint", "harmony", "music theory"]
  art_technique:
    weight: 6
    keywords: ["composition", "perspective", "color theory", "chiaroscuro", "impasto", "glazing"]
  literary_analysis:
    weight: 7
    keywords: ["narrative", "protagonist", "allegory", "symbolism", "literary criticism", "genre", "motif"]
  film_analysis:
    weight: 6
    keywords: ["cinematography", "mise en scene", "montage", "auteur", "film noir", "screenplay structure"]

domain_keywords:
  history:
    domain: history
    keywords: ["history", "historical", "ancient", "medieval", "renaissance", "industrial revolution", "world war", "civil war", "dynasty", "empire", "archaeology", "artifact", "civilization"]
  geography:
    domain: geography
    keywords: ["geography", "continent", "country", "capital", "population", "climate", "topography", "map", "latitude", "longitude"]
  travel:
    domain: travel
    keywords: ["travel", "itinerary", "vacation", "trip", "flight", "hotel", "destination", "backpacking", "sightseeing", "passport", "visa", "luggage"]
  music:
    domain: music
    keywords: ["music", "song", "album", "artist", "band", "genre", "guitar", "piano", "drums", "concert", "playlist", "lyrics", "instrument"]
  art:
    domain: art
    keywords: ["art", "painting", "sculpture", "drawing", "sketch", "gallery", "museum", "artist", "canvas", "watercolor", "oil painting", "digital art", "illustration"]
  philosophy:
    domain: philosophy
    keywords: ["philosophy", "ethics", "metaphysics", "epistemology", "existentialism", "stoicism", "logic", "moral", "socrates", "plato", "aristotle"]
  film_tv:
    domain: film_tv
    keywords: ["movie", "film", "tv show", "television", "streaming", "director", "actor", "actress", "cinema", "documentary", "series", "netflix", "anime", "screenplay", "sitcom", "drama series", "oscar", "emmy"]
  literature:
    domain: literature
    keywords: ["book", "novel", "author", "fiction", "nonfiction", "poetry", "poem", "reading", "literary", "genre fiction", "book club", "bibliography", "classic literature", "bestseller", "memoir"]
  theater:
    domain: theater
    keywords: ["theater", "theatre", "broadway", "musical", "play", "stage", "performing arts", "drama", "opera", "ballet", "monologue", "audition", "playwright", "choreography"]
  religion_spirituality:
    domain: religion_spirituality
    keywords: ["religion", "spiritual", "buddhism", "christianity", "islam", "hinduism", "judaism", "prayer", "scripture", "theology", "interfaith", "faith", "worship", "meditation practice", "mindfulness practice", "zen", "taoism"]
  linguistics:
    domain: linguistics
    keywords: ["etymology", "linguistics", "language history", "dialect", "syntax", "morphology", "phonetics", "semantics", "sociolinguistics", "pidgin", "creole", "grammar rules"]

pairings:
  - keywords: ["travel", "safety"]
    extra_weight: 10
    axis: risk
  - keywords: ["religion", "conflict"]
    extra_weight: 8
    axis: risk
  - keywords: ["film", "production"]
    extra_weight: 6
    axis: complexity
