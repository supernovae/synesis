# Synesis Lifestyle Vertical
# Biomechanics, Nutrition, Home Automation, Personal Finance.
# domain_running.yaml covers athletics; this extends the rest.

complexity_weights:
  nutrition_tracking:
    weight: 6
    keywords:
      - macro tracking
      - calorie counter
      - food log
      - meal prep
      - nutrient
      - bmr
      - tdee
  home_automation:
    weight: 10
    keywords:
      - home assistant
      - node-red
      - automations
      - zigbee
      - z-wave
      - mqtt
      - esphome
      - tasmota
  personal_finance:
    weight: 8
    keywords:
      - budget tracker
      - expense report
      - investment portfolio
      - tax calculation
      - 401k
      - ira
      - roth
      - ynab
      - mint

domain_keywords:
  nutrition_apps:
    domain: nutrition
    keywords:
      - cronometer
      - myfitnesspal
      - macro
      - meal plan
  smart_home:
    domain: home_automation
    keywords:
      - philips hue
      - smart things
      - alexa
      - google home
      - homekit
      - matter
  finance_tools:
    domain: personal_finance
    keywords:
      - plaid
      - yodlee
      - ledger
      - portfolio

pairings:
  - keywords: [financial, export]
    extra_weight: 15
    axis: risk
  - keywords: [home, security]
    extra_weight: 12
    axis: risk
  - keywords: [nutrition, medical]
    extra_weight: 12
    axis: risk
