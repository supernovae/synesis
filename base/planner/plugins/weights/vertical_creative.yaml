# Synesis Creative Media Vertical
# Digital Art, Video Editing, Procedural Generation, Illustration, Graphic Design, Crafts.
# vertical_music_audio.yaml covers audio production; this covers visual and procedural.

complexity_weights:
  video_processing:
    weight: 10
    keywords:
      - ffmpeg
      - video encode
      - video decode
      - transcoding
      - stream
      - h264
      - h265
      - vp9
      - av1
      - subtitle
      - timeline
  digital_art:
    weight: 8
    keywords:
      - canvas
      - svg
      - generative art
      - procedural texture
      - shader
      - raymarching
      - raytracing
  procedural_generation:
    weight: 12
    keywords:
      - procedural
      - perlin
      - simplex
      - voronoi
      - l-system
      - fractal
      - noise function
      - terrain generation
      - worldgen

