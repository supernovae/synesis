# Synesis Safety & Emergency Preparedness Plugin
# Focus: Emergency preparedness, disaster readiness, home safety, self-defense.

complexity_weights:
  disaster_planning:
    weight: 8
    keywords:
      - evacuation plan
      - emergency kit
      - go bag
      - 72 hour kit
      - shelter in place
      - communication plan
  survival_skills:
    weight: 10
    keywords:
      - water purification
      - fire starting
      - navigation
      - signaling
      - first aid wilderness
      - shelter building

risk_weights:
