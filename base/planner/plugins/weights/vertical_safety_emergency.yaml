      - disaster
      - earthquake
      - hurricane
      - tornado
      - flood
      - wildfire
      - evacuation
      - emergency kit
      - shelter
      - survival
      - water purification
      - emergency plan
      - power outage
      - generator
      - weather radio
      - stockpile
      - prepper
  home_safety:
    domain: home_safety
    keywords:
      - fire safety
      - smoke detector
