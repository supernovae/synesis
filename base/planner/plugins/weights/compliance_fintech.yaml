# Synesis Fintech & Banking Plugin
# Focus: PCI-DSS, Ledger-Integrity, KYC/AML, Anti-fraud. 95% vertical catalog.
risk_weights:
  transaction_logic:
    weight: 15
    domain: fintech_compliance
    keywords:
      - ledger
      - reconciliation
      - swift
      - iban
      - ach
      - wire transfer
      - payment
      - double-entry
      - ledger integrity
  fin_regulatory:
    weight: 12
    keywords:
      - pci-dss
      - pci dss
      - pci
      - sox
      - kyc
      - aml
      - basel iii
      - anti-fraud
      - antifraud
      - fraud detection

domain_keywords:
  fin_platforms:
    domain: fintech_compliance
    keywords:
      - stripe
      - plaid
      - adyen
      - fiserv

pairings:
  - keywords: ["ledger", "delete"]
    extra_weight: 30
    axis: risk
  - keywords: ["ledger", "update"]
    extra_weight: 25
    axis: risk
  - keywords: ["pci", "s3"]
    extra_weight: 30
    axis: risk
  - keywords: ["delete", "ledger"]
    extra_weight: 20
    axis: risk
  - keywords: ["modify", "transaction", "audit"]
    extra_weight: 15
    axis: risk
