# Synesis Food & Cooking Plugin
# Focus: Recipes, meal planning, baking, food science, beverages, dietary patterns, preservation.

complexity_weights:
  food_science:
    weight: 8
    keywords: ["fermentation", "emulsification", "maillard reaction", "gluten development", "tempering chocolate", "sous vide"]
  meal_planning:
    weight: 6
    keywords: ["meal prep", "weekly meal plan", "grocery list", "batch cooking", "macros", "calorie counting"]

domain_keywords:
  cooking:
    domain: cooking
    keywords: ["recipe", "ingredient", "cook", "cooking", "bake", "baking",
               "roast", "grill", "saute", "simmer", "stir fry", "meal prep",
               "kitchen", "oven", "stovetop", "instant pot", "air fryer", "slow cooker"]
  baking:
    domain: baking
    keywords: ["sourdough", "bread", "pastry", "cake", "cookies", "pie", "dough", "yeast", "flour", "frosting", "fondant"]
  food_science:
    domain: food_science
    keywords: ["fermentation", "kombucha", "kimchi", "pickling", "curing", "smoking", "dehydrating", "canning", "food safety", "temperature danger zone"]

  beverages:
    domain: beverages
    keywords: ["coffee", "espresso", "tea", "cocktail", "wine", "beer",
               "bartending", "barista", "latte art", "brewing", "mocktail",
               "smoothie", "kombucha", "cold brew", "pour over", "french press",
               "whiskey", "spirits", "mixology"]
  dietary_patterns:
    domain: dietary_patterns
    keywords: ["vegan", "vegetarian", "keto", "paleo", "gluten free", "whole30",
               "intermittent fasting", "fodmap", "allergen free", "plant based",
               "carnivore diet", "mediterranean diet", "dash diet",
               "low carb", "dairy free"]
  food_preservation:
    domain: food_preservation
    keywords: ["canning", "fermenting", "pickling", "dehydrating", "smoking", "curing", "preserving", "sourdough", "kimchi", "sauerkraut", "jerky", "jam", "jelly", "vacuum seal", "freeze drying"]

pairings:
  - keywords: ["allergy", "ingredient"]
    extra_weight: 10
    axis: risk
  - keywords: ["canning", "safety"]
    extra_weight: 12
    axis: risk
