pairings:
  - keywords: [dependency, upgrade]
    extra_weight: 8
    axis: complexity
  - keywords: [breaking change, production]
    extra_weight: 15
    axis: risk
  - keywords: [test, coverage]
    extra_weight: 5
    axis: complexity
