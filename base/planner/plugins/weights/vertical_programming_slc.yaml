# Synesis Programming & Software Lifecycle Vertical
# Deep language/ecosystem coverage. SLC phases: requirements, design, implement, test, deploy, maintain.
# Enables consistent routing, planning, critic strategy within programming taxonomy domains.

complexity_weights:
  requirements_phase:
    weight: 8
    keywords:
      - requirements
      - user story
      - acceptance criteria
      - spec
      - story point
      - epic
  design_phase:
    weight: 10
    keywords:
      - design doc
      - adr
      - architecture decision
      - system design
      - uml
      - sequence diagram
      - er diagram
  implementation_multi:
    weight: 10
    keywords:
      - implement
      - refactor across
      - multi-file
      - codebase
      - repository
  testing_phase:
    weight: 8
    keywords:
      - integration test
      - e2e test
      - test coverage
      - tdd
      - bdd
      - acceptance test
  deployment_phase:
    weight: 10
    keywords:
      - deploy
      - release
      - version bump
      - changelog
      - semver
      - release notes
  maintenance_phase:
    weight: 10
    keywords:
      - deprecate
      - migrate version
      - upgrade dependency
      - breaking change
      - backward compat
      - technical debt
  documentation_artifact:
    weight: 6
    keywords:
      - generate docs
      - readme
      - api docs
      - openapi
      - sphinx
      - javadoc
      - godoc
  dependency_mgmt:
    weight: 8
    keywords:
      - dependency
      - package manager
      - lockfile
      - transitive
      - vulnerability
      - sbom

