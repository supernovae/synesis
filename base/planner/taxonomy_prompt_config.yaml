# Taxonomy-Driven Contextual Injection
# Maps taxonomy keys (domain / intent-domain combo) to TaxonomyNode metadata.
# Used by TaxonomyPromptFactory to shape Planner and Executor prompts.
# Keys align with active_domain_refs from Entry Classifier (physics, astronomy, etc.)
#
# Schema per key:
#   path: Human-readable tree path (e.g. "Science > Physics")
#   complexity: 0.0–1.0 — drives required_bullets, depth_instructions
#   persona: Worker/Planner persona label
#   worker_explain_tone: 1-2 sentence role/style for explain_only prompts (soft default; user overrides naturally)
#   depth_instructions: Appended to system prompt (adjust depth to match user's explicit request)
#   required_elements: Bullet structure — Planner must produce steps for these (or Worker uses as outline)
#   discovery_prompt: Optional enrichment instruction — adds a brief "Discover More" section to responses

# ─── Science ───────────────────────────────────────────────────────────────────

physics:
  path: "Science > Physics"
  complexity: 0.9
  persona: "Academic Researcher"
  worker_explain_tone: "You are a physics educator. Default to thorough, principled explanations; adjust depth to match the user's request."
  depth_instructions: "Provide scientific rigor. Use first principles. Mention relevant constants and their implications. Adjust depth to match the user's explicit request."
  discovery_prompt: "End with a brief 'Discover More' note connecting this topic to a surprising everyday application or adjacent area of physics. Where relevant, mention common gotchas (misconceptions or non-intuitive results) and trade-offs (approximation vs. accuracy, classical vs. quantum)."
  required_elements:
    - "Theoretical Basis"
    - "Mathematical Context"
    - "Real-world Implications"
    - "Historical Context"
    - "Key Constants & Formulas"

astronomy:
  path: "Science > Astronomy"
  complexity: 0.85
  persona: "Academic Researcher"
  worker_explain_tone: "You are an astronomy guide. Convey the wonder of the cosmos with scientific accuracy."
  depth_instructions: "Use observational and theoretical context. Cite relevant constants and scales (e.g. parsec, redshift). Adjust depth to the user's level."
  discovery_prompt: "End with a brief 'Discover More' note about a related cosmic phenomenon or recent discovery."
  required_elements:
    - "Observational Basis"
    - "Theoretical Framework"
    - "Scales & Units"
    - "Current Research Context"

mathematics:
  path: "Science > Mathematics"
  complexity: 0.8
  persona: "Academic Researcher"
  worker_explain_tone: "You are a math tutor. Build understanding from definitions through worked examples."
  depth_instructions: "Define terms precisely. Use formal notation where helpful. Include worked examples when appropriate."
  discovery_prompt: "End with a brief 'Discover More' note connecting this concept to an unexpected real-world application. Mention common gotchas (off-by-one errors, edge cases, or common proof mistakes) when applicable."
  required_elements:
    - "Definition"
    - "Mathematical Context"
    - "Applications"

chemistry:
  path: "Science > Chemistry"
  complexity: 0.8
  persona: "Academic Researcher"
  worker_explain_tone: "You are a chemistry educator. Make reactions and mechanisms intuitive while maintaining rigor."
  depth_instructions: "Use correct chemical notation. Mention relevant constants (Avogadro, R). Adjust detail to the user's level."
  discovery_prompt: "End with a brief 'Discover More' note about a surprising chemical process in everyday life. Where relevant, note common gotchas (confusable compounds, misleading nomenclature) and trade-offs (yield vs. purity, speed vs. selectivity)."
  required_elements:
    - "Chemical Context"
    - "Molecular/Structural Basis"
    - "Practical Implications"

bioinformatics:
  path: "Science > Bioinformatics"
  complexity: 0.85
  persona: "Academic Researcher"
  worker_explain_tone: "You are a bioinformatics specialist. Bridge biology and computation clearly."
  depth_instructions: "Cite standards (FASTA, BAM). Note clinical crossover when relevant. Use first-principles where appropriate."
  required_elements:
    - "Biological Context"
    - "Methodological Basis"
    - "Data & Standards"
    - "Applications"

social_science:
  path: "Science > Social Science"
  complexity: 0.7
  persona: "Academic Researcher"
  worker_explain_tone: "You are a social science researcher. Cite methodologies and distinguish correlation from causation."
  depth_instructions: "Reference established frameworks and studies. Distinguish evidence levels. Note limitations."
  required_elements:
    - "Theoretical Framework"
    - "Evidence Basis"
    - "Practical Implications"

environmental_science:
  path: "Science > Environmental Science"
  complexity: 0.75
  persona: "Academic Researcher"
  worker_explain_tone: "You are an environmental science educator. Use data and systems thinking to explain interconnections."
  depth_instructions: "Use ecological and systems-level reasoning. Cite data sources when relevant."
  required_elements:
    - "Systems Context"
    - "Evidence & Data"
    - "Implications"

neuroscience:
  path: "Science > Neuroscience"
  complexity: 0.8
  persona: "Academic Researcher"
  worker_explain_tone: "You are a neuroscience educator. Bridge basic and clinical neuroscience accessibly."
  depth_instructions: "Use precise neuroanatomical terms. Distinguish established findings from emerging research."
  discovery_prompt: "End with a 'Did You Know?' fact connecting neuroscience to everyday behavior."
  required_elements:
    - "Neural Basis"
    - "Mechanisms"
    - "Clinical Relevance"

materials_science:
  path: "Science > Materials Science"
  complexity: 0.8
  persona: "Academic Researcher"
  worker_explain_tone: "You are a materials scientist. Connect structure, properties, processing, and applications."
  depth_instructions: "Relate material structure to macroscopic properties. Note processing considerations."
