# Synesis Universal Intent Ontology v4.1 — "The 95%" Router
# Global Sovereign Catalog: 100+ industrial/creative/lifestyle verticals.
# Split axes: complexity (tier) | risk (veto) | domain (RAG only).
# Trivial < 5 | Small 5-15 | Complex > 15 | Risk >= 15 → veto to complex
#
# See master_intent_weights.yaml and docs/TAXONOMY.md.
# Plugins in plugins/weights/*.yaml add vertical-specific depth.

thresholds:
  trivial_max: 4
  small_max: 15
  density_threshold: 3
  density_tax: 10
  educational_discount: 10
  risk_high: 15
  max_trivial_message_length: 200

risk_veto_triggers:
  - "pip install"
  - "pip3 install"
  - "npm install"
  - "yarn add"
  - "pnpm add"
  - "go get"
  - "cargo add"
  - "curl |"
  - "wget |"
  - "| bash"
  - "| sh"
  - "chmod +x"
  - "rm -rf"
  - "dd if="

