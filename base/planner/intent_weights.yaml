# Synesis Universal Intent Ontology v3.0
# Split axes: complexity (tier) | risk (veto) | domain (RAG only, no escalation)
# Trivial < 5 | Small 5-15 | Complex > 15 (complexity); risk_score >= 15 → veto to complex
#
# Key fix: domain_keywords (k8s, kubectl) populate active_domains for RAG but never escalate.
# Risk veto: destructive, security, credentials → force Supervisor regardless of complexity.

thresholds:
  trivial_max: 4
  small_max: 15
  density_threshold: 3
  density_tax: 10
  educational_discount: 10
  risk_high: 15   # risk_score >= this → complex (veto)
  max_trivial_message_length: 200   # long text often implies scope (confident trivial rule)

# Risk veto: if ANY match when otherwise trivial → force small (skip fast path)
# Catches "hello world, also curl | bash" or "pip install" that scoring might miss
risk_veto_triggers:
  - "pip install"
  - "pip3 install"
  - "npm install"
  - "curl |"
  - "wget |"
  - "| bash"
  - "| sh"
  - "chmod +x"

# Complexity: steps, uncertainty, scope. Single category capped ~10 so one word doesn't force complex.
complexity_weights:
  io_basic:
    weight: 1
    keywords: ["print", "prints", "echo", "log", "say", "hello", "fmt", "console", "write-host", "display", "show", "stdout", "output"]
  logic_basic:
    weight: 2
    keywords: ["math", "sum", "count", "calculate", "fizzbuzz", "loop", "iterate", "sort", "reverse", "basic", "simple", "minimal", "script"]
  query_basic:
    weight: 2
    keywords: ["what is", "how do i", "example of", "syntax for"]
  data_manipulation:
    weight: 5
    keywords: ["parse", "json", "csv", "yaml", "xml", "regex", "base64", "convert", "transform", "map", "filter"]
  local_persistence:
    weight: 8
    keywords: ["file", "directory", "folder", "read file", "write file", "save", "load", "mkdir", "path", "disk"]
  networking:
    weight: 8
    keywords: ["http", "request", "api", "rest", "client", "server", "port", "socket", "url", "curl", "wget", "endpoint", "fetch", "get", "post"]
  os_system:
    weight: 8
    keywords: ["process", "thread", "exec", "shell", "env", "variable", "systemd", "cron", "service", "daemon", "signal"]
  scope_expansion:
    weight: 10
    keywords: ["architecture", "design", "refactor", "integrate", "whole", "entire", "all files", "across", "restructure"]

# Risk: destructive, secrets, compliance. Can veto trivial/small → complex.
risk_weights:
  destructive:
    weight: 20
    keywords: ["delete", "wipe", "drop", "remove", "format", "truncate", "rotate keys"]
  security_governance:
    weight: 25
    keywords: ["auth", "login", "password", "token", "secret", "credentials", "vault", "encrypt", "decrypt", "fips", "tls", "ssl", "certificate", "audit"]

# Domain: RAG gravity only. Never escalates complexity.
domain_keywords:
  cloud_infra:
    domain: cloud
    keywords: ["aws", "s3", "lambda", "ec2", "gcp", "azure", "cloud", "bucket", "vpc", "terraform"]
  orchestration:
    domain: kubernetes
    keywords: ["k8s", "kubernetes", "openshift", "oc ", "kubectl", "pod", "deployment", "helm", "istio", "scc", "ingress", "manifest", "cluster"]
  persistence_engines:
    domain: databases
    keywords: ["sql", "database", "db", "postgres", "redis", "mongo", "query", "table", "schema", "migrate"]

pairings:
  # Risk pairings (add to risk_score)
  - keywords: ["delete", "database"]
    extra_weight: 15
    axis: risk
  - keywords: ["production", "deploy"]
    extra_weight: 20
    axis: risk
  - keywords: ["wipe", "cluster"]
    extra_weight: 20
    axis: risk

overrides:
  force_manual:
    - "[STRICT]"
    - "/plan"
    - "/manual"
    - "/strict"
    - "@plan"
  force_teach:
    - "explain"
    - "teach"
    - "how does it work"
    - "how does that work"
    - "why did"
    - "why do"
    - "why would"
    - "walk me through"
    - "i'm learning"
    - "learning how"
    - "learning to"
    - "what does this do"
    - "what does that mean"
    - "what does this code do"
    - "what does the code"
    - "can you explain"
  force_pro_advanced:
    - "plan first"
    - "break it down"
    - "break this down"
    - "step-by-step plan"
    - "execution plan"
    - "I need a plan"
    - "need a plan"
    - "full planning"
