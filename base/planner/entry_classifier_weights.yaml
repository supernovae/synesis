# Synesis EntryClassifier Scoring Configuration (v3)
# Split axes: complexity_weights | risk_weights | domain_keywords
# See intent_weights.yaml for full ontology; this is an alternate config.

thresholds:
  easy_max: 4
  medium_max: 15
  density_threshold: 3
  density_tax: 10

  risk_high: 15
  max_easy_message_length: 200

risk_veto_triggers:
  - "pip install"
  - "pip3 install"
  - "npm install"
  - "curl |"
  - "wget |"
  - "| bash"
  - "| sh"
  - "chmod +x"

complexity_weights:
  io_basic:
    weight: 1
    keywords: ["print", "prints", "echo", "log", "say", "hello", "fmt.print", "console.log", "stdout", "output"]
  logic_basic:
    weight: 2
    keywords: ["count", "sum", "add", "fizzbuzz", "loop", "iterate", "basic", "simple", "minimal", "script"]
  unit_test_basic:
    weight: 1
    keywords: ["unit test", "basic test", "add test", "pytest", "unittest", "test for"]
  parse_basic:
    weight: 1
    keywords: ["parse json", "parse this json", "parse csv", "read file and print", "read file and count"]
  create_basic:
    weight: 1
    keywords: ["create a script", "create a simple script", "write a script", "create a file"]
  data_processing:
    weight: 5
    keywords: ["regex", "filter", "sort", "mapping", "transform", "parse xml", "parse yaml"]
  file_ops:
    weight: 6
    keywords: ["read file", "write file", "save", "load", "directory", "mkdir", "path"]
  api_simple:
    weight: 6
    keywords: ["fetch", "request", "http", "get", "post", "api"]
  maintenance:
    weight: 5
    keywords: ["error handling", "refactor", "fix", "update", "modify"]
  scope_expansion:
    weight: 10
    keywords: ["design", "migrate", "refactor across", "architecture", "whole repo", "entire codebase", "system design", "high-level", "fix my project", "make this work"]

risk_weights:
  destructive:
    weight: 20
    keywords: ["delete", "wipe", "format", "rm ", "remove all", "drop table", "truncate", "rotate keys"]
  security:
    weight: 25
    keywords: ["auth", "credentials", "secret", "encrypt", "decrypt", "iam", "scc", "fips"]

domain_keywords:
  infrastructure:
    domain: kubernetes
    keywords: ["deploy", "k8s", "kubernetes", "openshift", "container", "docker", "helm", "manifest", "ci/cd", "pipeline"]
  cloud_services:
    domain: cloud
    keywords: ["aws", "gcp", "azure", "s3", "bucket", "database", "sql", "db"]

pairings:
  - keywords: ["delete", "database"]
    extra_weight: 15
    axis: risk
  - keywords: ["production", "deploy"]
    extra_weight: 20
    axis: risk

overrides:
  plan_session:
    - "[STRICT]"
    - "/plan"
    - "/manual"
    - "/strict"
    - "@plan"
    - "plan first"
    - "plan before"
    - "i need a plan"
    - "break it down"
    - "full planning"
    - "architecture review"
    - "design review"
    - "step-by-step plan"
    - "execution plan"
